<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Jurnal Produksi</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sans: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
      --radius: 14px;
      --radius-sm: 8px;
      --radius-lg: 20px;
      --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Dark theme — default */
    :root, html.dark {
      --bg: #0d1117;
      --bg-card: #161b22;
      --bg-elevated: #21262d;
      --bg-input: #0d1117;
      --border: #30363d;
      --border-focus: #388bfd;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --text-subtle: #484f58;
      --accent: #388bfd;
      --accent-soft: #1c2d44;
      --accent-text: #79c0ff;
      --success: #3fb950;
      --success-soft: #1a2f1e;
      --danger: #f85149;
      --danger-soft: #2d1517;
      --warning: #d29922;
      --warning-soft: #2d2005;
      --tab-bg: #0d1117;
      --tab-border: #21262d;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
    }

    html.light {
      --bg: #f6f8fa;
      --bg-card: #ffffff;
      --bg-elevated: #f0f3f6;
      --bg-input: #f6f8fa;
      --border: #d0d7de;
      --border-focus: #0969da;
      --text: #1f2328;
      --text-muted: #656d76;
      --text-subtle: #afb8c1;
      --accent: #0969da;
      --accent-soft: #ddf4ff;
      --accent-text: #0550ae;
      --success: #1a7f37;
      --success-soft: #dafbe1;
      --danger: #cf222e;
      --danger-soft: #fff0ee;
      --warning: #9a6700;
      --warning-soft: #fff8c5;
      --tab-bg: #ffffff;
      --tab-border: #d0d7de;
      --shadow: 0 8px 32px rgba(0,0,0,0.1);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
    }

    /* Fallback: ikut sistem kalau belum pernah di-toggle */
    @media (prefers-color-scheme: light) {
      html:not(.dark):not(.light) {
        --bg: #f6f8fa;
        --bg-card: #ffffff;
        --bg-elevated: #f0f3f6;
        --bg-input: #f6f8fa;
        --border: #d0d7de;
        --border-focus: #0969da;
        --text: #1f2328;
        --text-muted: #656d76;
        --text-subtle: #afb8c1;
        --accent: #0969da;
        --accent-soft: #ddf4ff;
        --accent-text: #0550ae;
        --success: #1a7f37;
        --success-soft: #dafbe1;
        --danger: #cf222e;
        --danger-soft: #fff0ee;
        --warning: #9a6700;
        --warning-soft: #fff8c5;
        --tab-bg: #ffffff;
        --tab-border: #d0d7de;
        --shadow: 0 8px 32px rgba(0,0,0,0.1);
        --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      }
    }

    html, body {
      height: 100%;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    #app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .app-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-date {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    /* ── PAGES ── */
    .page { display: none; flex: 1; overflow-y: auto; padding: 16px 20px; padding-bottom: 80px; overscroll-behavior-y: contain; }
    .page.active { display: block; animation: fadeSlide 0.2s ease; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── PULL TO REFRESH ── */
    #pullIndicator {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 0;
      overflow: hidden;
      background: var(--bg);
      z-index: 20;
      transition: height 0.15s ease;
      pointer-events: none;
    }
    #pullIndicator .pull-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }
    #pullIndicator svg {
      width: 18px; height: 18px;
      stroke: var(--text-muted);
      stroke-width: 2;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }
    #pullIndicator.releasing svg { transform: rotate(180deg); }
    @keyframes pullSpin { to { transform: rotate(360deg); } }
    #pullIndicator.loading svg { animation: pullSpin 0.6s linear infinite; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: var(--tab-bg);
      border-top: 1px solid var(--tab-border);
      display: flex;
      z-index: 100;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      transition: color var(--transition);
      color: var(--text-subtle);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .nav-item.active { color: var(--accent); }

    .nav-item svg { width: 22px; height: 22px; stroke-width: 1.8; }

    .nav-indicator {
      position: absolute;
      top: 0; height: 2px;
      background: var(--accent);
      border-radius: 0 0 2px 2px;
      width: 33.333%;
      transition: left 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .theme-toggle svg { width: 16px; height: 16px; stroke-width: 1.8; transition: opacity 0.15s; }
    .icon-sun { display: none; }
    .icon-moon { display: block; }
    html.light .icon-sun { display: block; }
    html.light .icon-moon { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .reloading svg { animation: spin 0.6s linear; }

    /* ── SYNC ── */
    .sync-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-subtle);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .sync-dot.ok  { background: #3fb950; }
    .sync-dot.err { background: var(--danger); }
    .sync-dot.loading { background: var(--accent); animation: spin 1s linear infinite; border-radius: 0; clip-path: none; }

    .sync-status-box { border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .sync-status-box.ok  { border-color: #3fb950; background: rgba(63,185,80,.08); color: #3fb950; }
    .sync-status-box.err { border-color: var(--danger); background: var(--danger-soft); color: var(--danger); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      top: 68px;
      left: 50%; transform: translateX(-50%) translateY(-8px);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text-muted);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.ok  { border-color: #3fb950; color: #3fb950; }
    #toast.err { border-color: var(--danger); color: var(--danger); }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 16px;
      color: var(--text-muted);
      text-align: center;
    }

    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 14px; line-height: 1.5; }

    /* ── FAB / ADD BUTTON ── */
    .fab {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px;
      margin-top: 12px;
      margin-bottom: 4px;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--sans);
      box-shadow: 0 2px 12px rgba(56,139,253,0.3);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .fab:active { transform: scale(0.98); box-shadow: none; }
    .fab svg { width: 18px; height: 18px; stroke-width: 2.5; flex-shrink: 0; }

    /* ── PRODUCT CARD ── */
    .product-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
      position: relative;
    }

    .drag-handle {
      position: absolute;
      top: 14px; left: 8px;
      width: 20px; height: 28px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; cursor: grab;
      opacity: 0;
      transition: opacity var(--transition);
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    .drag-handle span {
      display: block; width: 14px; height: 2px;
      background: var(--text-subtle); border-radius: 2px;
    }
    .product-card:hover .drag-handle,
    .product-card.active-card .drag-handle { opacity: 1; }
    .product-card.dragging {
      opacity: 0.4;
      pointer-events: none;
    }
    .product-card.drag-over {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-soft);
    }
    .drag-ghost {
      position: fixed;
      z-index: 999;
      pointer-events: none;
      opacity: 0.92;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      border-radius: var(--radius);
      background: var(--bg-card);
      border: 1px solid var(--accent);
      transform: rotate(1.5deg) scale(1.02);
      transition: none;
    }

    /* riwayat item juga sortable */
    .riwayat-item { position: relative; }
    .riwayat-item .drag-handle {
      top: 12px; left: 6px;
    }
    .riwayat-item:hover .drag-handle,
    .riwayat-item.ri-active .drag-handle { opacity: 1; }
    .riwayat-item.dragging { opacity: 0.4; pointer-events: none; }
    .riwayat-item.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }

    .product-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .product-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .product-date {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    .product-cols {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .product-cols.single { grid-template-columns: 1fr; }
    .product-cols.double { grid-template-columns: 1fr; } /* mobile: 1 kolom */

    .col-section { /* wrapper tiap kolom */ }

    /* Di split mode mobile, reset semua ukuran ke normal */
    .product-cols.double .container-row { padding: 6px 7px; gap: 3px; }
    .product-cols.double .container-row-bottom { gap: 3px; }
    .product-cols.double .container-input { font-size: 15px; padding: 5px 4px; }
    .product-cols.double .mult-label { font-size: 10px; }
    .product-cols.double .mult-step-btn { width: 28px; height: 30px; font-size: 15px; }
    .product-cols.double .mult-step-input { width: 30px; height: 30px; font-size: 12px; }
    .product-cols.double .mult-result { font-size: 10px; min-width: 0; }
    .product-cols.double .remove-btn { padding: 4px 3px; }
    .product-cols.double .remove-btn svg { width: 13px; height: 13px; }
    .product-cols.double .add-container-btn { font-size: 11px; padding: 7px 4px; gap: 3px; }
    .product-cols.double .add-container-btn svg { width: 11px; height: 11px; }
    .product-cols.double .col-label { font-size: 10px; letter-spacing: 0.3px; }
    .product-cols.double .target-badge { font-size: 9px; padding: 1px 4px; }
    .product-cols.double .edit-target-btn svg { width: 10px; height: 10px; }

    /* Layar ≥ 520px: split mode boleh 2 kolom */
    @media (min-width: 520px) {
      .product-cols.double { grid-template-columns: 1fr 1fr; }
    }

    .col-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .col-label span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .target-badge {
      font-family: var(--mono);
      font-size: 10px;
      background: var(--accent-soft);
      color: var(--accent-text);
      padding: 1px 6px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* ── KONTAINER ── */
    .container-list { display: flex; flex-direction: column; gap: 8px; }

    .container-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
    }

    .container-row-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .container-row-bottom {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .container-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      padding: 6px 10px;
      transition: border-color var(--transition);
      text-align: center;
      min-width: 0;
    }

    .container-input:focus {
      outline: none;
      border-color: var(--border-focus);
    }

    /* Label "×" pemisah */
    .mult-label {
      font-size: 12px;
      color: var(--text-subtle);
      flex-shrink: 0;
    }

    /* Stepper: [−] [input] [+] */
    .mult-stepper {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      flex-shrink: 0;
    }

    .mult-step-btn {
      background: var(--bg-card);
      border: none;
      color: var(--text-muted);
      width: 36px; height: 36px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), color var(--transition);
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .mult-step-btn:active { background: var(--accent-soft); color: var(--accent); }

    .mult-step-input {
      width: 44px;
      background: var(--bg-input);
      border: none;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      padding: 4px 2px;
      height: 36px;
      -moz-appearance: textfield;
    }
    .mult-step-input::-webkit-inner-spin-button,
    .mult-step-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .mult-step-input:focus { outline: none; background: var(--accent-soft); }

    /* "= NNN unit" hasil kali */
    .mult-result {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text-muted);
      flex: 1;
      text-align: right;
      white-space: nowrap;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--text-subtle);
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      border-radius: var(--radius-sm);
      transition: color var(--transition), background var(--transition);
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .remove-btn:active { color: var(--danger); background: var(--danger-soft); }
    .remove-btn svg { width: 16px; height: 16px; stroke-width: 2; }

    .add-container-btn {
      width: 100%;
      background: none;
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 13px;
      font-family: var(--sans);
      padding: 10px;
      cursor: pointer;
      transition: all var(--transition);
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }

    .add-container-btn:active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .add-container-btn svg { width: 14px; height: 14px; }

    /* Edit target inline */
    .col-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .col-label-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .edit-target-btn {
      background: none;
      border: none;
      color: var(--text-subtle);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .edit-target-btn:active { color: var(--accent); }
    .edit-target-btn svg { width: 11px; height: 11px; stroke-width: 2; }

    .target-edit-wrap {
      display: none;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .target-edit-wrap.visible { display: flex; }

    .target-edit-input {
      width: 80px;
      background: var(--bg-input);
      border: 1px solid var(--border-focus);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      padding: 5px 8px;
      text-align: center;
    }
    .target-edit-input:focus { outline: none; }

    .target-save-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 10px;
      cursor: pointer;
      font-family: var(--sans);
    }
    .summary-box {
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-top: 14px;
      border: 1px solid var(--border);
    }

    .summary-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .summary-grid { display: flex; flex-direction: column; gap: 6px; }

    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }

    .summary-label { color: var(--text-muted); }
    .summary-val { font-family: var(--mono); font-weight: 500; }

    .summary-divider { height: 1px; background: var(--border); margin: 4px 0; }

    .summary-total { font-weight: 700; font-size: 14px; }

    .diff-positive { color: var(--success); }
    .diff-negative { color: var(--danger); }
    .diff-zero { color: var(--success); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-sheet {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg-card);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 20px 20px 36px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      max-height: 90dvh;
      overflow-y: auto;
    }

    .modal-overlay.open .modal-sheet {
      transform: translateY(0);
    }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: -0.3px;
    }

    .field-group { margin-bottom: 16px; }

    .field-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      display: block;
    }

    .field-input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      padding: 11px 13px;
      transition: border-color var(--transition);
    }

    .field-input:focus { outline: none; border-color: var(--border-focus); }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: border-color var(--transition);
    }

    .checkbox-row:hover { border-color: var(--accent); }

    .checkbox-custom {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .checkbox-row.checked .checkbox-custom {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox-custom svg { width: 12px; height: 12px; opacity: 0; transition: opacity var(--transition); }
    .checkbox-row.checked .checkbox-custom svg { opacity: 1; }

    .checkbox-text { font-size: 14px; font-weight: 500; }
    .checkbox-desc { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .sub-targets {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease, opacity 0.2s ease;
      opacity: 0;
    }

    .sub-targets.visible { max-height: 200px; opacity: 1; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 13px;
      border-radius: var(--radius-sm);
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      border: 1px solid transparent;
    }

    .btn-ghost {
      background: var(--bg-elevated);
      color: var(--text-muted);
      border-color: var(--border);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px rgba(56,139,253,0.3);
    }

    .btn-primary:active { transform: scale(0.97); }

    /* ── RIWAYAT ── */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }

    .filter-chip {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .filter-chip.active {
      background: var(--accent-soft);
      color: var(--accent-text);
      border-color: var(--accent);
    }

    .custom-range {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .custom-range.visible { display: grid; }

    .riwayat-day-group { margin-bottom: 18px; }

    .riwayat-day-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-family: var(--mono);
    }

    /* ── RIWAYAT EXPANDABLE ── */
    .riwayat-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color var(--transition);
    }
    .riwayat-item:hover { border-color: var(--accent); }

    .riwayat-item-header {
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .riwayat-name { font-size: 14px; font-weight: 500; }
    .riwayat-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .riwayat-total { font-family: var(--mono); font-size: 15px; font-weight: 600; }

    .riwayat-chevron {
      color: var(--text-subtle);
      transition: transform 0.2s ease;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .riwayat-chevron svg { width: 14px; height: 14px; stroke-width: 2; display: block; }
    .riwayat-item.expanded .riwayat-chevron { transform: rotate(180deg); }

    .riwayat-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    .riwayat-item.expanded .riwayat-detail { max-height: 600px; }
    .riwayat-detail-inner {
      padding: 0 14px 12px;
      border-top: 1px solid var(--border);
    }

    .riwayat-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .riwayat-action-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      font-family: var(--sans);
      cursor: pointer;
      border: 1px solid var(--border);
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .riwayat-action-btn svg { width: 14px; height: 14px; stroke-width: 2; flex-shrink: 0; }

    .riwayat-action-btn.edit {
      background: var(--bg-elevated);
      color: var(--text-muted);
    }
    .riwayat-action-btn.edit:active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

    .riwayat-action-btn.delete {
      background: var(--bg-elevated);
      color: var(--text-muted);
    }
    .riwayat-action-btn.delete:active { border-color: var(--danger); color: var(--danger); background: var(--danger-soft); }

    /* ── KALENDER ── */
    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .cal-nav-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      cursor: pointer;
      width: 34px; height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }
    .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cal-nav-btn svg { width: 16px; height: 16px; stroke-width: 2; }

    .cal-month-year { font-size: 16px; font-weight: 700; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-dow {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: 4px 0;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      position: relative;
      transition: background var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .cal-day:hover { background: var(--bg-elevated); }
    .cal-day.today { font-weight: 700; color: var(--accent); }

    .cal-day.today::after {
      content: '';
      position: absolute;
      bottom: 4px;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    .cal-day.has-data { }

    .cal-day-dot {
      position: absolute;
      bottom: 3px;
      display: flex;
      gap: 2px;
    }

    .dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--success);
    }

    .cal-day.other-month { opacity: 0.3; }
    .cal-day.selected { background: var(--accent-soft); color: var(--accent-text); }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-title { font-size: 16px; font-weight: 700; }

    .delete-product-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-subtle);
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: all var(--transition);
      opacity: 0;
      pointer-events: none;
    }
    .delete-product-btn:hover { color: var(--danger); background: var(--danger-soft); }
    .delete-product-btn svg { width: 16px; height: 16px; stroke-width: 1.8; }
    .product-card:hover .delete-product-btn,
    .product-card.active-card .delete-product-btn { opacity: 1; pointer-events: auto; }

    /* ── RESPONSIVE: LAYAR LEBAR ── */
    @media (min-width: 768px) {
      #app {
        max-width: 100%;
      }

      .app-header {
        padding: 14px 32px;
      }

      .bottom-nav {
        padding: 0 32px;
      }

      /* Beranda: produk 2 kolom */
      #page-beranda {
        padding: 20px 32px 80px;
      }

      #page-beranda .section-header {
        margin-bottom: 16px;
      }

      .cards-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        align-items: start;
      }

      .cards-grid .product-card {
        margin-bottom: 0;
      }

      /* Riwayat & Kalender: max-width tapi tetap center */
      #page-riwayat,
      #page-kalender {
        padding: 20px 32px 80px;
        max-width: 760px;
        margin: 0 auto;
        width: 100%;
        box-sizing: border-box;
      }

      /* Pull indicator full width */
      #pullIndicator {
        max-width: 100%;
      }
    }

    @media (min-width: 1200px) {
      .app-header { padding: 14px 48px; }
      #page-beranda { padding: 24px 48px 80px; }
      #page-riwayat,
      #page-kalender {
        padding: 24px 48px 80px;
        max-width: 900px;
      }
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Pull to refresh indicator -->
  <div id="pullIndicator">
    <div class="pull-inner">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      <span id="pullLabel">Tarik untuk refresh</span>
    </div>
  </div>

  <!-- Header -->
  <header class="app-header">
    <div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="header-title">Jurnal Produksi</div>
        <div class="sync-dot" id="syncDot" title="Status sinkronisasi"></div>
      </div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="theme-toggle" id="settingsBtn" title="Pengaturan">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="theme-toggle" id="reloadBtn" title="Reload">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button class="theme-toggle" id="themeToggle" title="Ganti tema">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </header>

  <!-- Toast notifikasi -->
  <div id="toast"></div>

  <!-- Pages -->
  <div class="page active" id="page-beranda"></div>
  <div class="page" id="page-riwayat"></div>
  <div class="page" id="page-kalender"></div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="nav-indicator" id="navIndicator"></div>
    <div class="nav-item active" data-tab="beranda">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Beranda
    </div>
    <div class="nav-item" data-tab="riwayat">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Riwayat

      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Kalender
    </div>

</div>

<!-- Modal Tambah Produk -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Tambah Produk</div>

    <div class="field-group">
      <label class="field-label">Tanggal</label>
      <input class="field-input" type="date" id="inputTanggal" />
    </div>

    <div class="field-group">
      <label class="field-label">Nama Produk</label>
      <input class="field-input" type="text" id="inputNama" placeholder="Contoh: Komponen A, Pipa PVC..." />

    <div class="field-group">
      <div class="checkbox-row" id="checkboxRow">

          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>

          <label class="field-label">Target Porsi Kecil</label>

          <label class="field-label">Target Porsi Besar</label>

    <div class="modal-actions">

</div>


<!-- Modal Settings -->
<div class="modal-overlay" id="settingsOverlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Pengaturan</div>

    <div class="field-group">
      <label class="field-label">Apps Script URL</label>
      <input class="field-input" type="url" id="scriptUrlInput"
        placeholder="https://script.google.com/macros/s/..." />
      <div style="font-size:11px;color:var(--text-muted);margin-top:6px;line-height:1.5">
        Deploy Apps Script sebagai Web App, paste URL-nya di sini untuk sinkronisasi ke Google Sheets.
      </div>

    <div id="syncStatus" style="display:none;margin-bottom:12px;padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;"></div>

    <div class="modal-actions" style="flex-direction:column;gap:8px">
      <button class="btn btn-primary" id="btnSimpanUrl">Simpan & Sinkronisasi</button>
      <button class="btn btn-ghost" id="btnSyncNow" style="display:none">Sinkronisasi Sekarang</button>
      <button class="btn btn-ghost" id="btnSettingsBatal">Tutup</button>

  </div>
</div>


<div class="modal-overlay" id="editModalOverlay">

    <div class="modal-handle"></div>
    <div class="modal-title">Edit Produk</div>
    <input type="hidden" id="editProductId" />

    <div class="field-group">
      <label class="field-label">Tanggal</label>
      <input class="field-input" type="date" id="editTanggal" />
    </div>

    <div class="field-group">
      <label class="field-label">Nama Produk</label>
      <input class="field-input" type="text" id="editNama" />
    </div>

    <!-- Kontainer editor — diisi dinamis -->
    <div id="editContainerArea"></div>

    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnEditBatal">Batal</button>
      <button class="btn btn-primary" id="btnEditSimpan">Simpan</button>

<script>
// ── UTILS ──
const $ = (s, ctx = document) => ctx.querySelector(s);
const $$ = (s, ctx = document) => [...ctx.querySelectorAll(s)];
const today = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const fmt = (d) => new Date(d + 'T00:00:00').toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
const fmtShort = (d) => new Date(d + 'T00:00:00').toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
const fmtDay = (d) => new Date(d + 'T00:00:00').toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'short' });

// ── SYNC LAYER ──
const SCRIPT_URL_KEY = 'jp_script_url';
const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6qeWVq5aT6v7iRcg9ZUKYWRQv2g9-XnnbkEHXf8_I7o7l3JBbi3BtnnA8hGK8DlsQDg/exec';
const Sync = {
  url: () => localStorage.getItem(SCRIPT_URL_KEY) || DEFAULT_SCRIPT_URL,
  setDot(state) {
    const dot = document.getElementById('syncDot');
    if (!dot) return;
    dot.className = 'sync-dot' + (state !== 'idle' ? ' ' + state : '');
    dot.title = { idle: 'Belum terhubung', ok: 'Tersinkronisasi', err: 'Gagal sinkronisasi', loading: 'Menyinkronkan...' }[state] || '';
  },
  setStatus(msg, type = '') {
    const el = document.getElementById('syncStatus');
    if (!el) return;
    el.style.display = msg ? 'block' : 'none';
    el.textContent = msg;
    el.className = 'sync-status-box' + (type ? ' ' + type : '');
  },
  async get() {
    const r = await fetch(Sync.url());
    const j = await r.json();
    if (!j.ok) throw new Error(j.error);
    return j.data;
  },
  async post(body) {
    const url = Sync.url();
    if (!url) return;
    const r = await fetch(url, { method: 'POST', body: JSON.stringify(body) });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error);
    return j.data;
  },
  async pull() {
    if (!Sync.url()) return;
    Sync.setDot('loading');
    try { const rows = await Sync.get(); DB.save(rows); Sync.setDot('ok'); return rows; }
    catch(e) { Sync.setDot('err'); throw e; }
  },
  async add(p)    { if (!Sync.url()) return; Sync.setDot('loading'); try { await Sync.post({ action:'add', product:p }); Sync.setDot('ok'); } catch(e) { Sync.setDot('err'); } },
  async update(p) { if (!Sync.url()) return; Sync.setDot('loading'); try { await Sync.post({ action:'update', product:p }); Sync.setDot('ok'); } catch(e) { Sync.setDot('err'); } },
  async delete(id){ if (!Sync.url()) return; Sync.setDot('loading'); try { await Sync.post({ action:'delete', id }); Sync.setDot('ok'); } catch(e) { Sync.setDot('err'); } },
};

let _toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  if (!t) return;
  clearTimeout(_toastTimer);
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  _toastTimer = setTimeout(() => { t.className = ''; }, 2500);
}

// saveAndSync: simpan perubahan kontainer ke localStorage + sync ke sheet
function saveAndSync(pid, data) {
  // data = array lengkap yang sudah dimodifikasi di memory
  DB.save(data);
  const p = data.find(x => x.id === pid);
  if (p) Sync.update(p).then(() => showToast('✓ Tersimpan', 'ok')).catch(() => showToast('✗ Gagal sinkronisasi', 'err'));
}

// ── STORAGE ──
const DB = {
  get: () => JSON.parse(localStorage.getItem('cp_data') || '[]'),
  save: (data) => localStorage.setItem('cp_data', JSON.stringify(data)),
  addProduct: (p) => {
    const d = DB.get(); d.push(p); DB.save(d);
    Sync.add(p);
  },
  updateProduct: (id, updated) => {
    const d = DB.get();
    const i = d.findIndex(x => x.id === id);
    if (i >= 0) { d[i] = { ...d[i], ...updated }; DB.save(d); Sync.update(d[i]); }
  },
  deleteProduct: (id) => {
    DB.save(DB.get().filter(x => x.id !== id));
    Sync.delete(id);
  },
  getByDate: (date) => DB.get().filter(x => x.date === date).sort((a,b) => (a.order||0)-(b.order||0)),
  getByRange: (from, to) => DB.get().filter(x => x.date >= from && x.date <= to).sort((a,b) => (a.order||0)-(b.order||0)),
};

// ── PULL TO REFRESH ──
(function() {
  const THRESHOLD = 72;
  const MAX_PULL  = 96;
  let startY = 0, pulling = false, triggered = false;
  const ind = document.getElementById('pullIndicator');
  const lbl = document.getElementById('pullLabel');

  function getActivePage() {
    return document.querySelector('.page.active');
  }

  document.addEventListener('touchstart', (e) => {
    const pg = getActivePage();
    if (!pg) return;
    if (pg.scrollTop === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
      triggered = false;
    }
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy <= 0) { pulling = false; ind.style.height = '0'; return; }
    const h = Math.min(dy * 0.45, MAX_PULL);
    ind.style.height = h + 'px';
    ind.classList.remove('loading');
    if (dy > THRESHOLD) {
      ind.classList.add('releasing');
      lbl.textContent = 'Lepas untuk refresh';
      triggered = true;
    } else {
      ind.classList.remove('releasing');
      lbl.textContent = 'Tarik untuk refresh';
      triggered = false;
    }
  }, { passive: true });

  document.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    if (triggered) {
      ind.classList.remove('releasing');
      ind.classList.add('loading');
      lbl.textContent = 'Memperbarui...';
      ind.style.height = '48px';
      setTimeout(() => {
        refreshApp();
        ind.style.height = '0';
        ind.classList.remove('loading');
        lbl.textContent = 'Tarik untuk refresh';
      }, 700);
    } else {
      ind.style.height = '0';
      ind.classList.remove('releasing');
    }
    triggered = false;
  });
})();

function renderSummary(p) {
  const isSplit = p.split;

  const diffLabel = (diff, target) => {
    if (diff === 0) return { text: 'Sesuai Target', cls: 'diff-zero' };
    if (diff < 0)  return { text: `Kurang dari target (${target})`, cls: 'diff-negative' };
    return           { text: `Melebihi target (${target})`, cls: 'diff-positive' };
  };

  const calcCol = (containers, target) => {
    let total = 0;
    const lines = containers.map(c => {
      const sub = (c.val || 0) * (c.mult || 1);
      total += sub;
      return `<div class="summary-row">
        <span class="summary-label">${c.val || 0} × ${c.mult} kontainer</span>
        <span class="summary-val">${sub} pcs</span>
      </div>`;
    }).join('');
    const diff = total - (target || 0);
    return { lines, total, diff };
  };

  if (!isSplit) {
    const { lines, total, diff } = calcCol(p.containers.single, p.targetSingle);
    const { text, cls } = diffLabel(diff, p.targetSingle || 0);
    const diffStr = diff > 0 ? `+${diff}` : `${diff}`;
    return `<div class="summary-box">
      <div class="summary-title">Ringkasan</div>
      <div class="summary-grid">
        ${lines}
        <div class="summary-divider"></div>
        <div class="summary-row summary-total">
          <span>Total</span><span class="summary-val">${total} pcs</span>
        </div>
        <div class="summary-row">
          <span class="summary-label ${cls}">${text}</span>
          <span class="summary-val ${cls}">${diff === 0 ? '' : diffStr}</span>
        </div>
      </div>
    </div>`;
  } else {
    const besar = calcCol(p.containers.besar, p.targetBesar);
    const kecil = calcCol(p.containers.kecil, p.targetKecil);
    const grandTotal = besar.total + kecil.total;
    const totalTarget = (p.targetBesar || 0) + (p.targetKecil || 0);
    const grandDiff = grandTotal - totalTarget;
    const kecilInfo  = diffLabel(kecil.diff, p.targetKecil || 0);
    const besarInfo  = diffLabel(besar.diff, p.targetBesar || 0);
    const grandInfo  = diffLabel(grandDiff, totalTarget);
    const kecilStr   = kecil.diff > 0 ? `+${kecil.diff}` : `${kecil.diff}`;
    const besarStr   = besar.diff > 0 ? `+${besar.diff}` : `${besar.diff}`;
    const grandStr   = grandDiff > 0 ? `+${grandDiff}` : `${grandDiff}`;
    return `<div class="summary-box">
      <div class="summary-title">Ringkasan</div>
      <div class="summary-grid">
        <div class="summary-row"><span class="summary-label" style="font-weight:600">Porsi Kecil</span><span></span></div>
        ${kecil.lines}
        <div class="summary-row">
          <span class="summary-label ${kecilInfo.cls}">${kecilInfo.text}</span>
          <span class="summary-val ${kecilInfo.cls}">${kecil.diff === 0 ? kecil.total + ' pcs' : kecil.total + ' (' + kecilStr + ')'}</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-row"><span class="summary-label" style="font-weight:600">Porsi Besar</span><span></span></div>
        ${besar.lines}
        <div class="summary-row">
          <span class="summary-label ${besarInfo.cls}">${besarInfo.text}</span>
          <span class="summary-val ${besarInfo.cls}">${besar.diff === 0 ? besar.total + ' pcs' : besar.total + ' (' + besarStr + ')'}</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-row summary-total">
          <span>Total</span><span class="summary-val">${grandTotal} pcs</span>
        </div>
        <div class="summary-row">
          <span class="summary-label ${grandInfo.cls}">${grandInfo.text}</span>
          <span class="summary-val ${grandInfo.cls}">${grandDiff === 0 ? '' : grandStr}</span>
        </div>
      </div>
    </div>`;
  }
}

function attachCardEvents(ctx) {
  // Val input change → sync saat change (blur/enter)
  $$(`.container-input`, ctx).forEach(input => {
    input.addEventListener('change', () => {
      const pid = input.dataset.pid, col = input.dataset.col, idx = parseInt(input.dataset.cidx);
      const data = DB.get();
      const p = data.find(x => x.id === pid);
      if (!p) return;
      p.containers[col][idx].val = parseInt(input.value) || 0;
      saveAndSync(pid, data);
      updateResult(pid, col, idx, p.containers[col][idx]);
      refreshSummary(pid);
    });
    // Live update tampilan saja, sync saat change
    input.addEventListener('input', () => {
      const pid = input.dataset.pid, col = input.dataset.col, idx = parseInt(input.dataset.cidx);
      const data = DB.get();
      const p = data.find(x => x.id === pid);
      if (!p) return;
      p.containers[col][idx].val = parseInt(input.value) || 0;
      DB.save(data);
      updateResult(pid, col, idx, p.containers[col][idx]);
      refreshSummary(pid);
    });
  });

  // Mult stepper input change
  $$('.mult-step-input', ctx).forEach(input => {
    input.addEventListener('input', () => {
      const pid = input.dataset.pid, col = input.dataset.col, idx = parseInt(input.dataset.cidx);
      const val = Math.max(1, parseInt(input.value) || 1);
      input.value = val;
      saveMult(pid, col, idx, val);
    });
  });

  // Minus btn
  $$('.mult-minus', ctx).forEach(btn => {
    btn.addEventListener('click', () => {
      const pid = btn.dataset.pid, col = btn.dataset.col, idx = parseInt(btn.dataset.cidx);
      const inp = btn.nextElementSibling;
      const val = Math.max(1, parseInt(inp.value) - 1);
      inp.value = val;
      saveMult(pid, col, idx, val);
    });
  });

  // Plus btn
  $$('.mult-plus', ctx).forEach(btn => {
    btn.addEventListener('click', () => {
      const pid = btn.dataset.pid, col = btn.dataset.col, idx = parseInt(btn.dataset.cidx);
      const inp = btn.previousElementSibling;
      const val = parseInt(inp.value) + 1;
      inp.value = val;
      saveMult(pid, col, idx, val);
    });
  });

  // Remove container
  $$('.remove-btn', ctx).forEach(btn => {
    btn.addEventListener('click', () => {
      const pid = btn.dataset.pid, col = btn.dataset.col, idx = parseInt(btn.dataset.cidx);
      const data = DB.get();
      const p = data.find(x => x.id === pid);
      if (!p || p.containers[col].length <= 1) return;
      p.containers[col].splice(idx, 1);
      saveAndSync(pid, data);
      renderBeranda();
    });
  });

  // Add container
  $$('.add-container-btn', ctx).forEach(btn => {
    btn.addEventListener('click', () => {
      const pid = btn.dataset.pid, col = btn.dataset.col;
      const data = DB.get();
      const p = data.find(x => x.id === pid);
      if (!p) return;
      p.containers[col].push({ val: 0, mult: 1 });
      saveAndSync(pid, data);
      renderBeranda();
    });
  });

  // Edit target toggle
  $$('.edit-target-btn', ctx).forEach(btn => {
    btn.addEventListener('click', () => {
      const pid = btn.dataset.pid, col = btn.dataset.col;
      const editId = `${pid}-${col}`;
      const wrap = document.getElementById(`tedit-${editId}`);
      const inp = document.getElementById(`tinput-${editId}`);
      if (!wrap) return;
      const isVisible = wrap.classList.contains('visible');
      wrap.classList.toggle('visible', !isVisible);
      if (!isVisible && inp) {
        const data = DB.get();
        const p = data.find(x => x.id === pid);
        if (p) {
          const cur = col === 'single' ? p.targetSingle : col === 'besar' ? p.targetBesar : p.targetKecil;
          inp.value = cur || '';
          inp.focus();
        }
      }
    });
  });

  // Save target
  $$('.target-save-btn', ctx).forEach(btn => {
    btn.addEventListener('click', () => {
      const pid = btn.dataset.pid, col = btn.dataset.col;
      const editId = `${pid}-${col}`;
      const inp = document.getElementById(`tinput-${editId}`);
      const wrap = document.getElementById(`tedit-${editId}`);
      const badge = document.getElementById(`badge-${editId}`);
      if (!inp) return;
      const newVal = parseInt(inp.value) || 0;
      const data = DB.get();
      const p = data.find(x => x.id === pid);
      if (p) {
        if (col === 'single') p.targetSingle = newVal;
        else if (col === 'besar') p.targetBesar = newVal;
        else if (col === 'kecil') p.targetKecil = newVal;
        saveAndSync(pid, data);
        if (badge) badge.textContent = `Target: ${newVal}`;
        if (wrap) wrap.classList.remove('visible');
        refreshSummary(pid);
      }
    });
  });

  // Delete product
  $$('.delete-product-btn', ctx).forEach(btn => {
    btn.addEventListener('click', () => {
      DB.deleteProduct(btn.dataset.pid);
      renderBeranda();
    });
  });

  // Toggle active-card saat tap di HP (untuk munculkan tombol hapus)
  $$('.product-card', ctx).forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.delete-product-btn')) return;
      const isActive = card.classList.contains('active-card');
      $$('.product-card', ctx).forEach(c => c.classList.remove('active-card'));
      if (!isActive) card.classList.add('active-card');
    });
  });
}

function saveMult(pid, col, idx, val) {
  const data = DB.get();
  const p = data.find(x => x.id === pid);
  if (!p) return;
  p.containers[col][idx].mult = val;
  saveAndSync(pid, data);
  updateResult(pid, col, idx, p.containers[col][idx]);
  refreshSummary(pid);
}

function updateResult(pid, col, idx, c) {
  const res = document.querySelector(`[data-res="${pid}-${col}-${idx}"]`);
  if (res) res.textContent = `= ${(c.val || 0) * (c.mult || 1)}`;
}

function refreshSummary(pid) {
  const data = DB.get();
  const p = data.find(x => x.id === pid);
  if (!p) return;
  const card = document.querySelector(`.product-card[data-pid="${pid}"]`);
  if (!card) return;
  const existing = card.querySelector('.summary-box');
  if (existing) existing.remove();
  card.insertAdjacentHTML('beforeend', renderSummary(p));
}

// editState menyimpan salinan data yang sedang diedit (in-memory, belum disimpan)
let editState = null;

function renderEditCol(label, colKey, target, containers) {
  const rows = containers.map((c, i) => {
    const result = (c.val || 0) * (c.mult || 1);
    return `

        <span class="mult-label">×</span>
        <div class="mult-stepper">
          <button class="mult-step-btn edit-mult-minus" data-col="${colKey}" data-cidx="${i}">−</button>
          <input class="mult-step-input edit-mult-input" type="number" value="${c.mult || 1}"
            min="1" max="999" data-col="${colKey}" data-cidx="${i}" />
          <button class="mult-step-btn edit-mult-plus" data-col="${colKey}" data-cidx="${i}">+</button>
        </div>
        <span class="mult-result" id="editres-${colKey}-${i}">= ${result}</span>

        </button>
      </div>
    </div>`;
  }).join('');

  return `
    <div style="margin-bottom:14px">
      <div class="col-label" style="margin-bottom:8px">
        <div class="col-label-left">
          <span>${label}</span>
          <span class="target-badge" id="editbadge-${colKey}">Target: ${target || 0}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <input class="field-input edit-target-field" type="number" value="${target || 0}"
          min="0" data-col="${colKey}" placeholder="Target"
          style="padding:7px 10px;font-size:13px;" />
        <span style="font-size:12px;color:var(--text-muted);white-space:nowrap">= target</span>
      </div>

        Tambah Kontainer
      </button>
    </div>`;
}

function renderEditContainerArea() {
  const p = editState;
  const area = $('#editContainerArea');
  if (!p) return;

  if (p.split) {
    area.innerHTML =
      renderEditCol('Porsi Kecil', 'kecil', p.targetKecil, p.containers.kecil) +
      `<div style="height:1px;background:var(--border);margin:4px 0 14px"></div>` +
      renderEditCol('Porsi Besar', 'besar', p.targetBesar, p.containers.besar);
  } else {
    area.innerHTML = renderEditCol('Produksi', 'single', p.targetSingle, p.containers.single);
  }

  attachEditContainerEvents(area);
}

function attachEditContainerEvents(ctx) {
  // Val input
  $$('.edit-val-input', ctx).forEach(inp => {
    inp.addEventListener('input', () => {
      const col = inp.dataset.col, idx = parseInt(inp.dataset.cidx);
      editState.containers[col][idx].val = parseInt(inp.value) || 0;
      refreshEditResult(col, idx);
    });
  });

  // Mult input langsung
  $$('.edit-mult-input', ctx).forEach(inp => {
    inp.addEventListener('input', () => {
      const col = inp.dataset.col, idx = parseInt(inp.dataset.cidx);
      const val = Math.max(1, parseInt(inp.value) || 1);
      inp.value = val;
      editState.containers[col][idx].mult = val;
      refreshEditResult(col, idx);
    });
  });

  // Minus
  $$('.edit-mult-minus', ctx).forEach(btn => {
    btn.addEventListener('click', () => {
      const col = btn.dataset.col, idx = parseInt(btn.dataset.cidx);
      const inp = btn.nextElementSibling;
      const val = Math.max(1, parseInt(inp.value) - 1);
      inp.value = val;
      editState.containers[col][idx].mult = val;
      refreshEditResult(col, idx);
    });
  });

  // Plus
  $$('.edit-mult-plus', ctx).forEach(btn => {
    btn.addEventListener('click', () => {
      const col = btn.dataset.col, idx = parseInt(btn.dataset.cidx);
      const inp = btn.previousElementSibling;
      const val = parseInt(inp.value) + 1;
      inp.value = val;
      editState.containers[col][idx].mult = val;
      refreshEditResult(col, idx);
    });
  });

  // Remove kontainer
  $$('.edit-remove-btn', ctx).forEach(btn => {
    btn.addEventListener('click', () => {
      const col = btn.dataset.col, idx = parseInt(btn.dataset.cidx);
      if (editState.containers[col].length <= 1) return;
      editState.containers[col].splice(idx, 1);
      renderEditContainerArea();
    });
  });

  // Tambah kontainer
  $$('.edit-add-btn', ctx).forEach(btn => {
    btn.addEventListener('click', () => {
      const col = btn.dataset.col;
      editState.containers[col].push({ val: 0, mult: 1 });
      renderEditContainerArea();
    });
  });

  // Edit target langsung
  $$('.edit-target-field', ctx).forEach(inp => {
    inp.addEventListener('input', () => {
      const col = inp.dataset.col;
      const val = parseInt(inp.value) || 0;
      if (col === 'single') editState.targetSingle = val;
      else if (col === 'besar') editState.targetBesar = val;
      else if (col === 'kecil') editState.targetKecil = val;
      const badge = document.getElementById(`editbadge-${col}`);
      if (badge) badge.textContent = `Target: ${val}`;
    });
  });
}

function refreshEditResult(col, idx) {
  const c = editState.containers[col][idx];
  const el = document.getElementById(`editres-${col}-${idx}`);
  if (el) el.textContent = `= ${(c.val || 0) * (c.mult || 1)}`;
}

// Helper: render satu item riwayat (dipakai di riwayat & kalender)

      p.containers.kecil.reduce((s, c) => s + (c.val||0) * (c.mult||1), 0)
    : p.containers.single.reduce((s, c) => s + (c.val||0) * (c.mult||1), 0);
  const target = p.split ? (p.targetBesar||0) + (p.targetKecil||0) : (p.targetSingle||0);
  const diff = total - target;
  const dClass = diff > 0 ? 'diff-positive' : diff < 0 ? 'diff-negative' : 'diff-zero';

  return `<div class="riwayat-item" data-rid="${p.id}">
    <div class="drag-handle" title="Seret untuk mengurutkan"><span></span><span></span><span></span></div>

        <div style="text-align:right">
          <div class="riwayat-total">${total}</div>
          <div style="font-size:11px;font-family:var(--mono)" class="${dClass}">${diff >= 0 ? '+'+diff : diff}</div>
        </div>
        <div class="riwayat-chevron">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
    </div>
    <div class="riwayat-detail">
      <div class="riwayat-detail-inner">
        ${renderSummary(p)}
        <div class="riwayat-actions">
          <button class="riwayat-action-btn edit" data-pid="${p.id}">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit
          </button>
          <button class="riwayat-action-btn delete" data-pid="${p.id}">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>

    </div>
  </div>`;
}

function attachRiwayatItemEvents(ctx) {

// ── RIWAYAT ──
function renderRiwayat() {
  const pg = $('#page-riwayat');

  const getRange = () => {
    const t = today();
    if (riwayatFilter === '7d') {
      const d = new Date(); d.setDate(d.getDate() - 6);
      return [d.toISOString().split('T')[0], t];
    }
    if (riwayatFilter === '30d') {
      const d = new Date(); d.setDate(d.getDate() - 29);
      return [d.toISOString().split('T')[0], t];
    }
    if (riwayatFilter === 'custom') return [riwayatFrom || t, riwayatTo || t];
    return [t, t];
  };

  const [from, to] = getRange();
  const data = DB.getByRange(from, to);

  // Group by date
  const grouped = {};
  data.forEach(p => {
    if (!grouped[p.date]) grouped[p.date] = [];
    grouped[p.date].push(p);
  });
  const dates = Object.keys(grouped).sort().reverse();

  const customVisible = riwayatFilter === 'custom' ? 'visible' : '';

  pg.innerHTML = `
    <div class="filter-row">
      <div class="filter-chip ${riwayatFilter === '7d' ? 'active' : ''}" data-f="7d">7 Hari</div>
      <div class="filter-chip ${riwayatFilter === '30d' ? 'active' : ''}" data-f="30d">Bulan Ini</div>
      <div class="filter-chip ${riwayatFilter === 'custom' ? 'active' : ''}" data-f="custom">Custom</div>
    </div>
    <div class="custom-range ${customVisible}" id="customRange">
      <div>
        <label class="field-label">Dari</label>
        <input class="field-input" type="date" id="rangeFrom" value="${riwayatFrom}" />
      </div>
      <div>
        <label class="field-label">Sampai</label>
        <input class="field-input" type="date" id="rangeTo" value="${riwayatTo}" />
      </div>
    </div>
    ${dates.length === 0
      ? `<div class="empty-state" style="min-height:200px"><p>Tidak ada data di rentang ini.</p></div>`
      : dates.map(date => `
        <div class="riwayat-day-group">
          <div class="riwayat-day-label">${fmtDay(date)}</div>
          ${grouped[date].map(p => buildRiwayatItem(p)).join('')}
        </div>`).join('')}`;

  attachRiwayatItemEvents(pg);

  // Sortable per grup tanggal
  $$('.riwayat-day-group', pg).forEach(grp => makeSortable(grp));

  $$('.filter-chip', pg).forEach(chip => {
    chip.addEventListener('click', () => {
      riwayatFilter = chip.dataset.f;
      renderRiwayat();
    });
  });

  const fromEl = $('#rangeFrom'), toEl = $('#rangeTo');
  if (fromEl) fromEl.addEventListener('change', () => { riwayatFrom = fromEl.value; renderRiwayat(); });
  if (toEl) toEl.addEventListener('change', () => { riwayatTo = toEl.value; renderRiwayat(); });
}

// ── KALENDER ──
function renderKalender() {
  const pg = $('#page-kalender');
  const allData = DB.get();
  const dateDots = {};
  allData.forEach(p => { dateDots[p.date] = true; });

  const DAYS = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
  const now = new Date();
  const todayStr = today();
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0);
  const startDow = firstDay.getDay();
  const monthName = firstDay.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });

  let cells = '';
  // Pad start
  for (let i = 0; i < startDow; i++) {
    const d = new Date(calYear, calMonth, -startDow + i + 1);
    const ds = d.toISOString().split('T')[0];
    cells += `<div class="cal-day other-month" data-date="${ds}"><span>${d.getDate()}</span></div>`;
  }
  // Days
  for (let i = 1; i <= lastDay.getDate(); i++) {
    const d = new Date(calYear, calMonth, i);
    const ds = d.toISOString().split('T')[0];
    const isToday = ds === todayStr;
    const hasDot = dateDots[ds];
    cells += `<div class="cal-day${isToday ? ' today' : ''}${hasDot ? ' has-data' : ''}" data-date="${ds}">
      <span>${i}</span>
      ${hasDot ? '<div class="cal-day-dot"><div class="dot"></div></div>' : ''}
    </div>`;
  }

  pg.innerHTML = `
    <div class="calendar-header">
      <button class="cal-nav-btn" id="calPrev">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="cal-month-year">${monthName}</div>
      <button class="cal-nav-btn" id="calNext">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="cal-grid">
      ${DAYS.map(d => `<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
    <div id="calDetail" style="margin-top:18px"></div>`;

  $('#calPrev').addEventListener('click', () => {
    calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
    renderKalender();
  });
  $('#calNext').addEventListener('click', () => {
    calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
    renderKalender();
  });

  $$('.cal-day', pg).forEach(day => {
    day.addEventListener('click', () => {
      const date = day.dataset.date;
      $$('.cal-day', pg).forEach(d => d.classList.remove('selected'));
      day.classList.add('selected');
      renderCalDetail(date);
    });
  });
}

function renderCalDetail(date) {
  const det = $('#calDetail');
  const products = DB.getByDate(date);
  if (products.length === 0) {
    det.innerHTML = `<div style="text-align:center;padding:20px 0;color:var(--text-muted);font-size:13px">${fmtShort(date)} — Belum ada data</div>`;
    return;
  }
  det.innerHTML = `<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);margin-bottom:10px;font-family:var(--mono)">${fmtDay(date)}</div>` +
    products.map(p => buildRiwayatItem(p)).join('');

  attachRiwayatItemEvents(det);
  makeSortable(det);
}

// ── DRAG & DROP SORT ──
function makeSortable(containerEl, getIdFn) {
  // getIdFn(el) → product id dari elemen item
  let dragEl = null, ghostEl = null;
  let startX = 0, startY = 0, offsetX = 0, offsetY = 0;
  let lastOver = null;

  function getItems() {
    return [...containerEl.querySelectorAll(':scope > [data-pid], :scope > [data-rid]')];
  }

  function createGhost(el) {
    const rect = el.getBoundingClientRect();
    const g = el.cloneNode(true);
    g.className = 'drag-ghost';
    g.style.width = rect.width + 'px';
    g.style.top = rect.top + 'px';
    g.style.left = rect.left + 'px';
    document.body.appendChild(g);
    return g;
  }

  function moveGhost(x, y) {
    if (!ghostEl) return;
    ghostEl.style.top = (y - offsetY) + 'px';
    ghostEl.style.left = (x - offsetX) + 'px';
  }

  function getTargetItem(y) {
    return getItems().find(el => {
      if (el === dragEl) return false;
      const r = el.getBoundingClientRect();
      return y >= r.top && y <= r.bottom;
    });
  }

  containerEl.addEventListener('touchstart', (e) => {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    e.preventDefault();
    const item = handle.closest('[data-pid],[data-rid]');
    if (!item) return;

    dragEl = item;
    const rect = item.getBoundingClientRect();
    const touch = e.touches[0];
    startX = touch.clientX; startY = touch.clientY;
    offsetX = touch.clientX - rect.left;
    offsetY = touch.clientY - rect.top;

    ghostEl = createGhost(item);
    dragEl.classList.add('dragging');

    // Hapus expanded state sementara
    dragEl.classList.remove('expanded');
  }, { passive: false });

  containerEl.addEventListener('touchmove', (e) => {
    if (!dragEl) return;
    e.preventDefault();
    const touch = e.touches[0];
    moveGhost(touch.clientX, touch.clientY);

    // Highlight target
    const over = getTargetItem(touch.clientY);
    if (over !== lastOver) {
      if (lastOver) lastOver.classList.remove('drag-over');
      if (over) over.classList.add('drag-over');
      lastOver = over;
    }
  }, { passive: false });

  containerEl.addEventListener('touchend', (e) => {
    if (!dragEl) return;

    if (ghostEl) { ghostEl.remove(); ghostEl = null; }
    dragEl.classList.remove('dragging');
    if (lastOver) lastOver.classList.remove('drag-over');

    const drop = lastOver;
    lastOver = null;

    if (drop && drop !== dragEl) {
      // Reorder di DOM
      const items = getItems();
      const fromIdx = items.indexOf(dragEl);
      const toIdx = items.indexOf(drop);

      if (fromIdx !== toIdx) {
        if (fromIdx < toIdx) drop.after(dragEl);
        else drop.before(dragEl);

        // Ambil urutan baru dan simpan ke DB
        const newOrder = getItems().map(el => el.dataset.pid || el.dataset.rid);
        const allData = DB.get();
        newOrder.forEach((id, idx) => {
          const p = allData.find(x => x.id === id);
          if (p) p.order = idx;
        });
        DB.save(allData);

        // Sync semua yang berubah urutan
        newOrder.forEach(id => {
          const p = allData.find(x => x.id === id);
          if (p) Sync.update(p).catch(() => {});
        });
        showToast('✓ Urutan disimpan', 'ok');
      }
    }

    dragEl = null;
  });
}

// ── INIT ──
setTab('beranda');

// ── SERVICE WORKER ──
// Unregister service worker lama agar tidak cache file
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
}
</script>
